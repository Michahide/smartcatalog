# SmartCatalog — Nginx Configuration
# Place at /etc/nginx/sites-available/smartcatalog

# ── Frontend: Next.js (port 3000) ──────────────────────────────────────────
server {
    listen 80;
    server_name smartcatalog.local;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── Backend: Laravel API (port 8000) ───────────────────────────────────────
server {
    listen 80;
    server_name api.smartcatalog.local;
    root /var/www/smartcatalog/backend/public;
    index index.php;

    # Increase buffer for SSE streaming
    proxy_buffering          off;
    proxy_read_timeout       300s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include         snippets/fastcgi-php.conf;
        fastcgi_pass    unix:/run/php/php8.3-fpm.sock;
        fastcgi_param   SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include         fastcgi_params;

        # Required for SSE (AI chat streaming)
        fastcgi_read_timeout   300s;
        fastcgi_buffering      off;
    }

    location ~ /\.ht {
        deny all;
    }

    # CORS headers
    add_header 'Access-Control-Allow-Origin'  'http://smartcatalog.local' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

    location = /api/chat {
        # Disable buffering specifically for SSE endpoint
        proxy_buffering    off;
        fastcgi_buffering  off;
        try_files $uri $uri/ /index.php?$query_string;
    }
}
