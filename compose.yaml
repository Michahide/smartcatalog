# Compatible with: Docker Compose v2, Podman Compose, podman-compose
# Tested with: Podman on Windows (rootless, podman-machine)

services:

  # ── MySQL ────────────────────────────────────────────────────────────────────
  mysql:
    image: docker.io/mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: smartcatalog
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: docker.io/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Laravel Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: SmartCatalog
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ""
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: smartcatalog
      DB_USERNAME: root
      DB_PASSWORD: secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-8b-instruct:free}
      FRONTEND_URL: http://localhost:3000
      SANCTUM_STATEFUL_DOMAINS: "localhost:3000,localhost"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Use array form — works consistently across Docker Compose and Podman Compose
    entrypoint:
      - sh
      - -c
      - |
        php artisan key:generate --force
        php artisan package:discover --ansi
        php artisan config:clear
        php artisan migrate --force
        php artisan db:seed --force
        php artisan config:cache
        php artisan route:cache
        exec /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Build args for Next.js public env vars (baked at build time)
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    # Runtime env — OPENROUTER_API_KEY stays server-side only (not baked into image)
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-8b-instruct:free}
    depends_on:
      - backend

volumes:
  mysql_data:
